<script>
// Simple click-to-play with name hide + autoplay
document.querySelectorAll('.video-card').forEach(item => {
  item.addEventListener('click', () => {
    if (item.classList.contains('played')) return;

    const videoId = item.dataset.videoId;  // Assure-toi que c'est data-video-id dans HTML
    const wrapper = item.querySelector('.video-wrapper');
    const overlay = item.querySelector('.overlay');

    // Cache l'overlay (nom disparaît)
    overlay.classList.add('hidden');

    // Crée l'iframe avec mute + autoplay forcé
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=0&mute=0&rel=0&modestbranding=1&playsinline=1`;
    iframe.allow = "autoplay; encrypted-media; fullscreen";  // Important ici !
    iframe.allowFullscreen = true;
    iframe.style.border = '0';

    // Vide le wrapper et ajoute l'iframe
    wrapper.innerHTML = '';
    wrapper.appendChild(iframe);

    item.classList.add('played');
  });
});

</script>
